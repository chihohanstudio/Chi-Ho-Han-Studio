<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Han Studio — Prototype</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Mock data + utils (plain JS) -->
<script src="mock-data.js"></script>
<script src="utils.js"></script>

<!-- React pieces (JSX) — share globals via window -->
<script type="text/babel" data-presets="react" src="components/Primitives.jsx"></script>
<script type="text/babel" data-presets="react" src="components/AppStore.jsx"></script>
<script type="text/babel" data-presets="react" src="components/Shell.jsx"></script>
<script type="text/babel" data-presets="react" src="pages/Student.jsx"></script>
<script type="text/babel" data-presets="react" src="pages/StudioClass.jsx"></script>
<script type="text/babel" data-presets="react" src="pages/Admin.jsx"></script>
<script type="text/babel" data-presets="react" src="pages/DesignSystem.jsx"></script>
<script type="text/babel" data-presets="react" src="components/ios-frame.jsx"></script>
<script type="text/babel" data-presets="react" src="pages/Mobile.jsx"></script>
<script type="text/babel" data-presets="react" src="components/Auth.jsx"></script>
<script type="text/babel" data-presets="react" src="components/App.jsx"></script>
<script type="text/babel" data-presets="react" src="components/TopShell.jsx"></script>

<script type="text/babel" data-presets="react">
(function mount() {
  if (!window.TopShell || !window.AppProvider || !window.DesignSystemPage || !window.MobilePage) { return setTimeout(mount, 30); }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<TopShell />);

  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') { if (window.__setTweaksOpen) window.__setTweaksOpen(true); }
    if (e.data?.type === '__deactivate_edit_mode') { if (window.__setTweaksOpen) window.__setTweaksOpen(false); }
  });
  window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
})();
</script>
</body>
</html>
